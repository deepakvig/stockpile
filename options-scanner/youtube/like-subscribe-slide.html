<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Like & Subscribe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  .slide {
    width: 1280px;
    height: 720px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    position: relative;
    overflow: hidden;
  }

  .slide::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #f97316, #fb923c);
    border-radius: 12px 12px 0 0;
  }

  .headline {
    font-size: 1.4rem;
    font-weight: 600;
    color: #e2e8f0;
    letter-spacing: 0.05em;
  }

  .buttons {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  /* ── Like button ── */
  .like-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #334155;
    border: 2px solid #475569;
    border-radius: 999px;
    padding: 18px 36px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .like-btn:hover { background: #3f5068; }

  .like-btn svg {
    width: 40px;
    height: 40px;
    fill: #f1f5f9;
  }

  .like-btn span {
    font-size: 1.5rem;
    font-weight: 600;
    color: #f1f5f9;
    letter-spacing: 0.03em;
  }

  /* ── Subscribe button ── */
  .sub-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #ff0000;
    border: none;
    border-radius: 999px;
    padding: 18px 36px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .sub-btn:hover { background: #cc0000; }

  .sub-btn svg {
    width: 40px;
    height: 40px;
    fill: #ffffff;
  }

  .sub-btn span {
    font-size: 1.5rem;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.03em;
  }

  /* ── Bell button ── */
  .bell-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #334155;
    border: 2px solid #475569;
    border-radius: 999px;
    width: 76px;
    height: 76px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .bell-btn:hover { background: #3f5068; }

  .bell-btn svg {
    width: 36px;
    height: 36px;
    fill: #f1f5f9;
  }

  .tagline {
    font-size: 1.1rem;
    color: #e2e8f0;
    letter-spacing: 0.04em;
  }

  .agenda {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-self: stretch;
    padding: 0 100px;
  }

  .agenda-item {
    display: flex;
    align-items: center;
    gap: 18px;
    font-size: 1.65rem;
    color: #e2e8f0;
  }

  .agenda-item .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #f97316;
    flex-shrink: 0;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: #334155;
    margin: 0 100px;
    align-self: stretch;
  }
</style>
</head>
<body>
<div class="slide">

  <div class="agenda">
    <div class="agenda-item"><span class="dot"></span>Chart &amp; tables — a closer look</div>
    <div class="agenda-item"><span class="dot"></span>Setup — quick and easy</div>
    <div class="agenda-item"><span class="dot"></span>How I built it with Claude</div>
  </div>

  <div class="divider"></div>

  <div class="headline">Enjoying the video?</div>

  <div class="buttons">

    <!-- Like button with YouTube thumbs-up SVG -->
    <div class="like-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/>
      </svg>
      <span>Like</span>
    </div>

    <!-- Subscribe button with YouTube play icon -->
    <div class="sub-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21.58 7.19c-.23-.86-.91-1.54-1.77-1.77C18.25 5 12 5 12 5s-6.25 0-7.81.42c-.86.23-1.54.91-1.77 1.77C2 8.75 2 12 2 12s0 3.25.42 4.81c.23.86.91 1.54 1.77 1.77C5.75 19 12 19 12 19s6.25 0 7.81-.42c.86-.23 1.54-.91 1.77-1.77C22 15.25 22 12 22 12s0-3.25-.42-4.81zM10 15V9l5.2 3-5.2 3z"/>
      </svg>
      <span>Subscribe</span>
    </div>

    <!-- Bell button -->
    <div class="bell-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
      </svg>
    </div>

  </div>

  <div class="tagline">More tools and tutorials coming soon</div>

</div>
</body>
</html>
